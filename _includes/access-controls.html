<div class="banner-access-controls d-flex align-items-center gap-2">
    <form class="nav-editor-form" data-editor-auth-form>
        <label class="visually-hidden" for="banner-editor-email">Editor email</label>
        <input class="form-control form-control-sm nav-auth-input nav-editor-email" id="banner-editor-email" name="email" type="email" autocomplete="username" placeholder="Editor email" required>
        <label class="visually-hidden" for="banner-editor-password">Editor password</label>
        <input class="form-control form-control-sm nav-auth-input nav-editor-input" id="banner-editor-password" name="password" type="password" autocomplete="current-password" placeholder="Password" required>
        <button class="btn btn-sm btn-outline-light nav-auth-submit" type="submit" aria-label="Sign in to catalog room">Sign in</button>
    </form>
    <a class="btn btn-sm btn-outline-light d-none nav-editor-button" href="{{ '/catalog-room.html' | relative_url }}" data-auth-editor-link aria-label="Open catalog room" title="Open catalog room">
        <span aria-hidden="true">✎</span>
    </a>
    <button class="btn btn-sm btn-outline-light d-none" type="button" data-editor-logout aria-label="Sign out of catalog room" title="Sign out of catalog room">Sign out</button>
</div>
