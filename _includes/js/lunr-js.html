{%- assign fields = site.data.config-search -%}
{%- assign index_fields = fields | where: 'index','true' -%}
<script src="{{ '/assets/lib/lunr.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/lunr-store.js' | relative_url }}"></script>
<script>
function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

var idx = lunr(function () {
  this.ref('id');
  {% for f in index_fields %}
  this.field({{ f.field | jsonify }});
  {% endfor %}

  for (var item in store) {
    this.add({
      {% for f in index_fields %}
      {{ f.field | jsonify }}: store[item][{{ f.field | jsonify }}],
      {% endfor %}
      id: item
    });
  }
});

function lunr_search () {
  var resultdiv = document.querySelector('#lunrResults');
  var resultmeta = document.querySelector('#lunrResultsMeta');
  var query = document.querySelector('#lunrSearchBox').value;

  if (!query || !query.trim()) {
    resultmeta.innerHTML = "Enter a search term to begin.";
    resultdiv.innerHTML = "";
    return;
  }

  var result = idx.search(query);
  resultmeta.innerHTML = result.length + ' result' + (result.length === 1 ? '' : 's') + ' for "' + escapeHtml(query) + '"';

  var newresults = '';
  for (var item in result) {
    var ref = result[item].ref;
    var searchitem = '<article class="search-result-card">';
    searchitem += '<h3 class="search-result-title"><a href="{{ site.baseurl }}/item.html?id=' + store[ref].id + '">' + escapeHtml(store[ref][{{ fields[0].field | jsonify }}]) + '</a></h3>';
    searchitem += '<dl class="search-result-meta">';
    {% assign display = fields | where: 'display','true' %}
    {% for d in display offset:1 %}
    if(store[ref][{{ d.field | jsonify }}]) {
      searchitem += '<div class="search-result-line"><dt>{{ d.display_name | default: d.field }}</dt><dd>' + escapeHtml(store[ref][{{ d.field | jsonify }}]) + '</dd></div>';
    }
    {% endfor %}
    searchitem += '</dl></article>';
    newresults += searchitem;
  }

  if (!newresults) {
    newresults = '<div class="browse-empty">No records matched this search. Try a broader place, material, subject, or community term.</div>';
  }

  resultdiv.innerHTML = newresults;
}

if (window.location.search) {
  var queryString = decodeURIComponent(window.location.search.substring(1).split("=").slice(1).join("="));
  document.querySelector('#lunrSearchBox').value = queryString;
  lunr_search();
} else {
  document.querySelector('#lunrResultsMeta').innerHTML = "Enter a search term to begin.";
}
</script>
