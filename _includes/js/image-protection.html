<script>
  (function () {
    function isProtectedImage(img) {
      if (!img || img.tagName !== "IMG") return false;
      if (img.classList.contains("protected-image")) return true;

      var candidates = [
        img.getAttribute("src") || "",
        img.getAttribute("data-src") || "",
        img.currentSrc || ""
      ];

      return candidates.some(function (value) {
        return value.indexOf("/assets/thumbs/") > -1 || value.indexOf("/objects/") > -1;
      });
    }

    function hardenImage(img) {
      if (!isProtectedImage(img)) return;
      img.setAttribute("draggable", "false");
      img.setAttribute("oncontextmenu", "return false;");
      img.style.webkitUserDrag = "none";
      img.style.userSelect = "none";
    }

    document.addEventListener("contextmenu", function (event) {
      var img = event.target && event.target.closest ? event.target.closest("img") : null;
      if (isProtectedImage(img)) {
        event.preventDefault();
      }
    });

    document.addEventListener("dragstart", function (event) {
      var img = event.target && event.target.closest ? event.target.closest("img") : null;
      if (isProtectedImage(img)) {
        event.preventDefault();
      }
    });

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("img").forEach(hardenImage);
    });

    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (!node || node.nodeType !== 1) return;
          if (node.tagName === "IMG") {
            hardenImage(node);
          }
          if (node.querySelectorAll) {
            node.querySelectorAll("img").forEach(hardenImage);
          }
        });
      });
    });

    observer.observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>
