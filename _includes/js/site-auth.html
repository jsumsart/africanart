<script>
(function () {
    const editorUrl = {{ '/catalog-room.html' | relative_url | jsonify }};
    const browseUrl = {{ '/browse.html' | relative_url | jsonify }};
    const editorSessionKey = {{ site.data.theme.editor-gate-session-key | default: 'jsu-african-art-editor' | jsonify }};
    const editorEmailKey = {{ site.data.theme.editor-email-storage-key | default: 'jsu-african-art-editor-email' | jsonify }};
    const editorProofKey = editorSessionKey + "-proof";
    const editorPasswordSha = {{ site.data.theme.editor-gate-password-sha256 | default: "" | jsonify }};
    const editorLabel = {{ site.data.theme.editor-gate-label | default: 'Catalog Room' | jsonify }};

    function normalizePath(path) {
        if (!path) return "/";
        let normalized = path;
        if (normalized.endsWith("/index.html")) normalized = normalized.slice(0, -10) || "/";
        if (normalized.length > 1 && normalized.endsWith("/")) normalized = normalized.slice(0, -1);
        return normalized || "/";
    }

    async function sha256(value) {
        const bytes = new TextEncoder().encode(value);
        const digest = await window.crypto.subtle.digest("SHA-256", bytes);
        return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function isEditorUnlocked() {
        return window.localStorage.getItem(editorSessionKey) === "granted";
    }

    function getEditorEmail() {
        return window.localStorage.getItem(editorEmailKey) || "";
    }

    function setEditorSession(granted, email, passwordHash) {
        if (granted) {
            window.localStorage.setItem(editorSessionKey, "granted");
            if (email) window.localStorage.setItem(editorEmailKey, email);
            if (passwordHash) window.localStorage.setItem(editorProofKey, passwordHash);
        } else {
            window.localStorage.removeItem(editorSessionKey);
            window.localStorage.removeItem(editorEmailKey);
            window.localStorage.removeItem(editorProofKey);
        }
        setUnlockedState();
    }

    function setUnlockedState() {
        const editorUnlocked = isEditorUnlocked();
        const editorEmail = getEditorEmail();
        document.body.classList.remove("collection-locked", "collection-unlocked");
        document.body.classList.add("collection-unlocked", "auth-ready");

        document.querySelectorAll("[data-auth-editor-link]").forEach((el) => {
            el.classList.toggle("d-none", !editorUnlocked);
        });
        document.querySelectorAll("[data-editor-auth-form]").forEach((el) => {
            el.classList.toggle("d-none", editorUnlocked);
        });
        document.querySelectorAll("[data-editor-logout]").forEach((el) => {
            el.classList.toggle("d-none", !editorUnlocked);
        });
        document.querySelectorAll("[data-editor-session-label]").forEach((el) => {
            el.textContent = editorUnlocked && editorEmail ? editorEmail : "";
            el.classList.toggle("d-none", !(editorUnlocked && editorEmail));
        });
    }

    function showAlert(message, tone) {
        document.querySelectorAll("[data-auth-alert]").forEach((el) => {
            el.textContent = message;
            el.className = "access-alert";
            if (tone) el.classList.add("access-alert-" + tone);
            el.classList.remove("d-none");
        });
    }

    function clearAlert() {
        document.querySelectorAll("[data-auth-alert]").forEach((el) => {
            el.textContent = "";
            el.classList.add("d-none");
        });
    }

    async function handleEditorSubmit(event) {
        event.preventDefault();
        clearAlert();

        const form = event.currentTarget;
        const emailInput = form.querySelector('input[type="email"]');
        const passwordInput = form.querySelector('input[type="password"]');
        const submitButton = form.querySelector('button[type="submit"]');
        const email = (emailInput.value || "").trim();
        const password = passwordInput.value || "";

        if (!email || !password) {
            showAlert("Enter your email and the catalog room password to continue.", "error");
            return;
        }
        if (!editorPasswordSha) {
            showAlert("Editor access is not configured yet.", "error");
            return;
        }

        const originalText = submitButton.textContent;
        submitButton.disabled = true;
        submitButton.textContent = "Opening...";
        try {
            const digest = await sha256(password);
            if (digest !== editorPasswordSha) {
                throw new Error("That editor password was not recognized.");
            }
            passwordInput.value = "";
            setEditorSession(true, email, digest);
            window.location.assign(editorUrl);
        } catch (error) {
            showAlert(error.message || "Editor access could not be opened.", "error");
            passwordInput.value = "";
            passwordInput.focus();
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = originalText;
        }
    }

    function handleEditorLogout(event) {
        if (event) event.preventDefault();
        setEditorSession(false);
        if (normalizePath(window.location.pathname) === normalizePath(editorUrl)) {
            window.location.assign(browseUrl);
        }
    }

    setUnlockedState();

    document.querySelectorAll("[data-editor-auth-form]").forEach((el) => {
        el.addEventListener("submit", handleEditorSubmit);
    });
    document.querySelectorAll("[data-editor-logout]").forEach((el) => {
        el.addEventListener("click", handleEditorLogout);
    });
    document.querySelectorAll("[data-auth-editor], [data-auth-editor-link]").forEach((el) => {
        el.addEventListener("click", function (event) {
            event.preventDefault();
            const targetUrl = el.getAttribute("href") || editorUrl;
            if (!isEditorUnlocked()) {
                const editorInput = document.querySelector(".nav-editor-form input[type='password']");
                if (editorInput) editorInput.focus();
                showAlert("Enter the " + editorLabel.toLowerCase() + " password to open editing access.", "info");
                return;
            }
            window.location.assign(targetUrl);
        });
    });

    document.addEventListener("keydown", function (event) {
        if (!isEditorUnlocked()) return;
        if (!(event.shiftKey && event.key.toLowerCase() === "e")) return;
        const tag = (event.target && event.target.tagName) ? event.target.tagName.toLowerCase() : "";
        if (tag === "input" || tag === "textarea" || event.target.isContentEditable) return;
        event.preventDefault();
        window.location.assign(editorUrl);
    });
})();
</script>
