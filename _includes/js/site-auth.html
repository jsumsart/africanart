{% if site.data.theme.staff-gate-enabled == true %}
<script>
(function () {
    const homeUrl = {{ '/' | relative_url | jsonify }};
    const browseUrl = {{ '/browse.html' | relative_url | jsonify }};
    const editorUrl = {{ '/catalog-room.html' | relative_url | jsonify }};
    const publicPaths = [{% assign gate_public_paths = site.data.theme.staff-gate-public-paths | split: ';' %}{% for p in gate_public_paths %}{{ p | relative_url | jsonify }}{% unless forloop.last %}, {% endunless %}{% endfor %}];
    const sessionKey = {{ site.data.theme.staff-gate-session-key | default: 'jsu-african-art-access' | jsonify }};
    const passwordHash = {{ site.data.theme.staff-gate-password-sha256 | jsonify }};
    const label = {{ site.data.theme.staff-gate-label | default: 'Staff Access' | jsonify }};
    const editorSessionKey = {{ site.data.theme.editor-gate-session-key | default: 'jsu-african-art-editor' | jsonify }};
    const editorPasswordHash = {{ site.data.theme.editor-gate-password-sha256 | jsonify }};
    const editorLabel = {{ site.data.theme.editor-gate-label | default: 'Catalog Room' | jsonify }};

    function normalizePath(path) {
        if (!path) return "/";
        let normalized = path;
        if (normalized.endsWith("/index.html")) {
            normalized = normalized.slice(0, -10) || "/";
        }
        if (normalized.length > 1 && normalized.endsWith("/")) {
            normalized = normalized.slice(0, -1);
        }
        return normalized || "/";
    }

    function currentPathWithQuery() {
        return window.location.pathname + window.location.search + window.location.hash;
    }

    async function sha256(value) {
        const bytes = new TextEncoder().encode(value);
        const digest = await window.crypto.subtle.digest("SHA-256", bytes);
        return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function isUnlocked() {
        return window.localStorage.getItem(sessionKey) === "granted";
    }

    function isEditorUnlocked() {
        return window.localStorage.getItem(editorSessionKey) === "granted";
    }

    function setUnlockedState(unlocked) {
        const editorUnlocked = unlocked && isEditorUnlocked();
        document.body.classList.remove("collection-locked", "collection-unlocked");
        document.body.classList.add(unlocked ? "collection-unlocked" : "collection-locked");
        document.body.classList.add("auth-ready");

        document.querySelectorAll("[data-protected-nav]").forEach((el) => {
            el.classList.toggle("d-none", !unlocked);
        });
        document.querySelectorAll("[data-auth-open]").forEach((el) => {
            el.classList.toggle("d-none", !unlocked);
        });
        document.querySelectorAll(".nav-auth-form").forEach((el) => {
            el.classList.toggle("d-none", unlocked);
        });
        document.querySelectorAll(".nav-access-prompt").forEach((el) => {
            el.classList.toggle("d-none", !unlocked);
        });
        document.querySelectorAll("[data-auth-editor-link]").forEach((el) => {
            el.classList.toggle("d-none", !editorUnlocked);
        });
        document.querySelectorAll("[data-editor-auth-form]").forEach((el) => {
            el.classList.toggle("d-none", !unlocked || editorUnlocked);
        });
        document.querySelectorAll("[data-editor-logout]").forEach((el) => {
            el.classList.toggle("d-none", !editorUnlocked);
        });
        document.querySelectorAll("[data-auth-logout]").forEach((el) => {
            el.classList.toggle("d-none", !unlocked);
        });
    }

    function showAlert(message, tone) {
        document.querySelectorAll("[data-auth-alert]").forEach((el) => {
            el.textContent = message;
            el.className = "access-alert";
            if (tone) {
                el.classList.add("access-alert-" + tone);
            }
            el.classList.remove("d-none");
        });
    }

    function clearAlert() {
        document.querySelectorAll("[data-auth-alert]").forEach((el) => {
            el.textContent = "";
            el.classList.add("d-none");
        });
    }

    function focusAuthForm() {
        const navInput = document.querySelector(".nav-auth-form input[type='password']");
        if (navInput && !navInput.closest(".d-none")) {
            window.setTimeout(() => navInput.focus(), 120);
            return;
        }
    }

    function onTriggerClick(event) {
        event.preventDefault();
        if (isUnlocked()) {
            window.location.assign(browseUrl);
            return;
        }
        if (normalizePath(window.location.pathname) !== normalizePath(homeUrl)) {
            const next = encodeURIComponent(currentPathWithQuery());
            window.location.assign(homeUrl + "?auth=prompt&next=" + next);
            return;
        }
        focusAuthForm();
        showAlert("Enter the " + label.toLowerCase() + " password to open research access.", "info");
    }

    async function handleSubmit(event) {
        event.preventDefault();
        clearAlert();
        const form = event.currentTarget;
        const passwordInput = form.querySelector("input[type='password']");
        const submitted = passwordInput.value;
        const submittedHash = await sha256(submitted);
        if (submittedHash === passwordHash) {
            window.localStorage.setItem(sessionKey, "granted");
            setUnlockedState(true);
            const params = new URLSearchParams(window.location.search);
            const next = params.get("next") || browseUrl;
            window.location.assign(next);
            return;
        }
        passwordInput.value = "";
        showAlert("That password was not recognized. Please try again.", "error");
        passwordInput.focus();
    }

    async function handleEditorSubmit(event) {
        event.preventDefault();
        clearAlert();
        const form = event.currentTarget;
        const passwordInput = form.querySelector("input[type='password']");
        const submittedHash = await sha256(passwordInput.value);
        if (submittedHash === editorPasswordHash) {
            window.localStorage.setItem(editorSessionKey, "granted");
            setUnlockedState(true);
            passwordInput.value = "";
            window.location.assign(editorUrl);
            return;
        }
        passwordInput.value = "";
        showAlert("That " + editorLabel.toLowerCase() + " password was not recognized. Please try again.", "error");
        passwordInput.focus();
    }

    function handleLogout(event) {
        if (event) event.preventDefault();
        window.localStorage.removeItem(sessionKey);
        window.localStorage.removeItem(editorSessionKey);
        setUnlockedState(false);
        if (!isPublicPage()) {
            window.location.assign(homeUrl);
        }
    }

    function handleEditorLogout(event) {
        if (event) event.preventDefault();
        window.localStorage.removeItem(editorSessionKey);
        setUnlockedState(isUnlocked());
        if (normalizePath(window.location.pathname) === normalizePath(editorUrl)) {
            window.location.assign(browseUrl);
        }
    }

    function isPublicPage() {
        const current = normalizePath(window.location.pathname);
        const allowed = publicPaths.map(normalizePath);
        allowed.push(normalizePath(homeUrl));
        return allowed.includes(current);
    }

    const unlocked = isUnlocked();
    setUnlockedState(unlocked);

    document.querySelectorAll("[data-auth-trigger]").forEach((el) => {
        el.addEventListener("click", onTriggerClick);
    });
    document.querySelectorAll("[data-auth-form]").forEach((el) => {
        el.addEventListener("submit", handleSubmit);
    });
    document.querySelectorAll("[data-editor-auth-form]").forEach((el) => {
        el.addEventListener("submit", handleEditorSubmit);
    });
    document.querySelectorAll("[data-auth-logout]").forEach((el) => {
        el.addEventListener("click", handleLogout);
    });
    document.querySelectorAll("[data-editor-logout]").forEach((el) => {
        el.addEventListener("click", handleEditorLogout);
    });
    document.querySelectorAll("[data-auth-editor], [data-auth-editor-link]").forEach((el) => {
        el.addEventListener("click", function (event) {
            event.preventDefault();
            if (!isUnlocked()) {
                onTriggerClick(event);
                return;
            }
            if (!isEditorUnlocked()) {
                const editorInput = document.querySelector(".nav-editor-form input[type='password']");
                if (editorInput) {
                    editorInput.focus();
                }
                showAlert("Enter the " + editorLabel.toLowerCase() + " password to open editing access.", "info");
                return;
            }
            window.location.assign(editorUrl);
        });
    });

    document.addEventListener("keydown", function (event) {
        if (!(isUnlocked() && isEditorUnlocked())) return;
        if (!(event.shiftKey && event.key.toLowerCase() === "e")) return;
        const tag = (event.target && event.target.tagName) ? event.target.tagName.toLowerCase() : "";
        if (tag === "input" || tag === "textarea" || event.target.isContentEditable) return;
        event.preventDefault();
        window.location.assign(editorUrl);
    });

    const params = new URLSearchParams(window.location.search);
    if (!unlocked && normalizePath(window.location.pathname) !== normalizePath(homeUrl) && !isPublicPage()) {
        const next = encodeURIComponent(currentPathWithQuery());
        window.location.replace(homeUrl + "?auth=required&next=" + next);
        return;
    }
    if (unlocked && normalizePath(window.location.pathname) === normalizePath(editorUrl) && !isEditorUnlocked()) {
        window.location.replace(browseUrl);
        return;
    }

    if (!unlocked && isPublicPage() && (params.get("auth") === "required" || params.get("auth") === "prompt")) {
        showAlert("Research access is currently protected by a temporary password layer while the site remains in active development. Enter the password below to continue.", "info");
        if (normalizePath(window.location.pathname) === normalizePath(homeUrl)) {
            window.setTimeout(focusAuthForm, 250);
        }
    }
})();
</script>
{% endif %}
