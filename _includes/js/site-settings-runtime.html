<script>
window.JSUSiteSettingsConfig = {
  metadataUrl: {{ '/assets/data/metadata.json' | relative_url | jsonify }},
  defaults: {
    primary_color: {{ site.data.theme["primary-color"] | default: "#14213d" | jsonify }},
    secondary_color: {{ site.data.theme["secondary-color"] | default: "#243b63" | jsonify }},
    text_color: {{ site.data.theme.text-color | default: "#111827" | jsonify }},
    link_color: {{ site.data.theme.link-color | default: "#1f3a68" | jsonify }},
    body_font_family: {{ site.data.theme.base-font-family | default: "'Source Sans 3', system-ui, sans-serif" | jsonify }},
    heading_font_family: {{ site.data.theme.heading-font-family | default: "'Source Serif 4', Georgia, serif" | jsonify }},
    featured_image: {{ site.data.theme.featured-image | default: "" | jsonify }},
    home_banner_image_position: {{ site.data.theme.home-banner-image-position | default: "center" | jsonify }}
  }
};

window.JSUApplySiteSettings = async function (settings) {
  const config = window.JSUSiteSettingsConfig || {};
  const merged = Object.assign({}, config.defaults || {}, settings || {});
  const root = document.documentElement;

  if (merged.primary_color) root.style.setProperty("--indigo", merged.primary_color);
  if (merged.secondary_color) root.style.setProperty("--indigo-soft", merged.secondary_color);
  if (merged.text_color) root.style.setProperty("--ink", merged.text_color);
  if (merged.link_color) root.style.setProperty("--ochre", merged.link_color);
  if (merged.body_font_family) root.style.setProperty("--body-font-family", merged.body_font_family);
  if (merged.heading_font_family) root.style.setProperty("--heading-font-family", merged.heading_font_family);

  const homeBanner = document.getElementById("home-banner");
  if (homeBanner && merged.home_banner_image_position) {
    homeBanner.style.backgroundPosition = merged.home_banner_image_position;
  }

  if (homeBanner && merged.featured_image) {
    let imageUrl = merged.featured_image;
    if (imageUrl.indexOf("/") !== 0 && imageUrl.indexOf("http") !== 0) {
      try {
        const response = await fetch(config.metadataUrl, { cache: "no-store" });
        const metadata = await response.json();
        const match = (metadata || []).find(function (item) {
          return item["Object name"] === merged.featured_image;
        });
        if (match && match["File name"]) {
          imageUrl = {{ '/assets/thumbs/' | relative_url | jsonify }} + match["File name"];
        }
      } catch (_error) {}
    }
    homeBanner.style.backgroundImage = "url('" + imageUrl + "')";
  }
};

(function () {
  window.JSUApplySiteSettings((window.JSUSiteSettingsConfig || {}).defaults || {});
})();
</script>
